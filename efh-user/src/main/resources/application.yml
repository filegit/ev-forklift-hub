# 用户服务配置文件
# 端口: 8081
# 功能: 用户注册、登录、信息管理

server:
  port: 8081
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 10000

spring:
  application:
    name: efh-user
  
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/efh_user_0?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      connection-timeout: 30000
  
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: 6379
    password: ${REDIS_PASSWORD:123456}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:127.0.0.1:9092}
    producer:
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: efh-user-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

redisson:
  address: redis://${REDIS_HOST:127.0.0.1}:6379
  password: ${REDIS_PASSWORD:123456}
  database: 0
  timeout: 3000
  connection-pool-size: 64
  connection-minimum-idle-size: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.efh: debug
    org.apache.shardingsphere: info

efh:
  sms:
    mock: ${SMS_MOCK:false}
    code-expire-seconds: 300
    send-interval-seconds: 60
    region-id: ${SMS_REGION_ID:cn-hangzhou}
    access-key-id: ${SMS_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ACCESS_KEY_SECRET:}
    sign-name: ${SMS_SIGN_NAME:恒创联众}
    template-code: ${SMS_TEMPLATE_CODE:100001}
    template-param: ${SMS_TEMPLATE_PARAM:{"code":"##code##","min":"5"}}
    country-code: ${SMS_COUNTRY_CODE:86}
    scheme-name: ${SMS_SCHEME_NAME:}
    code-length: ${SMS_CODE_LENGTH:6}
    code-type: ${SMS_CODE_TYPE:1}

user:
  payment:
    alipay:
      enabled: ${ALIPAY_ENABLED:false}
      app-id: ${ALIPAY_APP_ID:}
      private-key: ${ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
      notify-url: ${USER_ALIPAY_NOTIFY_URL:http://localhost/user/api/points/pay/alipay/notify}
      return-url: ${USER_ALIPAY_RETURN_URL:http://localhost/points/pay/result}
      sandbox: ${ALIPAY_SANDBOX:true}
