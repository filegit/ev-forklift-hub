# Docker Compose 配置文件
# 新能源叉车社区平台 - 完整部署方案

version: '3.8'

services:
  # ==================== 基础设施层 ====================
  
  # MySQL 主数据库
  mysql:
    image: mysql:8.0
    container_name: efh-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # 初始化脚本
      - ./docker/mysql/conf:/etc/mysql/conf.d  # MySQL 配置
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - efh-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: efh-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - efh-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: efh-nacos
    restart: always
    environment:
      MODE: standalone  # 单机模式
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: 123456
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-logs:/home/nacos/logs
      - nacos-data:/home/nacos/data
    networks:
      - efh-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Kafka (可选 - 用于消息队列)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: efh-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - efh-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: efh-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - efh-network

  # Elasticsearch (可选 - 用于全文搜索)
  elasticsearch:
    image: elasticsearch:7.17.9
    container_name: efh-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=123456
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - efh-network

  # ==================== 微服务层 ====================

  # API 网关
  gateway:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        MODULE_NAME: efh-gateway
    container_name: efh-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
    networks:
      - efh-network
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 用户服务
  user-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        MODULE_NAME: efh-user
    container_name: efh-user
    restart: always
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
      KAFKA_SERVERS: kafka:29092
    networks:
      - efh-network
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 社区服务
  community-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        MODULE_NAME: efh-community
    container_name: efh-community
    restart: always
    ports:
      - "8082:8082"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
      KAFKA_SERVERS: kafka:29092
      ES_URIS: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: 123456
    networks:
      - efh-network
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 配件服务
  parts-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        MODULE_NAME: efh-parts
    container_name: efh-parts
    restart: always
    ports:
      - "8083:8083"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
      KAFKA_SERVERS: kafka:29092
      ES_URIS: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: 123456
    networks:
      - efh-network
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 维修服务
  service-service:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        MODULE_NAME: efh-service
    container_name: efh-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PASSWORD: 123456
      KAFKA_SERVERS: kafka:29092
    networks:
      - efh-network
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== 前端应用 ====================

  # 前端应用
  web:
    build:
      context: ./efh-web
      dockerfile: Dockerfile
    container_name: efh-web
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    networks:
      - efh-network
    depends_on:
      - gateway

# ==================== 网络配置 ====================
networks:
  efh-network:
    driver: bridge

# ==================== 数据卷配置 ====================
volumes:
  mysql-data:
  redis-data:
  nacos-logs:
  nacos-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  es-data:
