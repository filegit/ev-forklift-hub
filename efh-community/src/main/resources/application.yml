# 社区服务配置文件
# 端口: 8082
# 功能: 帖子发布、评论、搜索

server:
  port: 8082

spring:
  application:
    name: efh-community
  
  main:
    allow-bean-definition-overriding: true
  
  # 排除 Elasticsearch 自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
  
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/efh_community_0?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      connection-timeout: 30000
  
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: 6379
    password: ${REDIS_PASSWORD:123456}
    database: 1
    timeout: 3000ms
  
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:127.0.0.1:9092}
    producer:
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: efh-community-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

redisson:
  address: redis://${REDIS_HOST:127.0.0.1}:6379
  password: ${REDIS_PASSWORD:123456}
  database: 1
  timeout: 3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.efh: debug
