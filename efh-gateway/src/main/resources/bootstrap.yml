# Spring Cloud Bootstrap 配置文件

spring:
  application:
    name: efh-gateway
  cloud:
    nacos:
      username: nacos
      password: nacos
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: 80fe315a-7634-4d77-b7d3-703a2a24d7a0
        file-extension: yml
        group: DEFAULT_GROUP
        enabled: false
        refresh-enabled: true
        timeout: 10000
        username: nacos
        password: nacos
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: 80fe315a-7634-4d77-b7d3-703a2a24d7a0
        group: DEFAULT_GROUP
        enabled: true
        register-enabled: true
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        username: nacos
        password: nacos
        watch:
          enabled: true
        naming-load-cache-at-start: true
        fail-fast: false
