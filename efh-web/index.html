<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="叉车智联中台">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="新能源叉车业务协同中台，覆盖配件采购、知识库、AI助手、维修服务和社区协作。">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>叉车智联中台</title>
  <style>
    .app-boot {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f8fb;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    .app-boot__panel {
      width: min(360px, calc(100vw - 48px));
      padding: 28px;
      border: 1px solid #e3e8f0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(28, 39, 60, 0.08);
      text-align: center;
    }

    .app-boot__mark {
      width: 42px;
      height: 42px;
      margin: 0 auto 16px;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    .app-boot__title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .app-boot__text {
      margin: 0;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-boot">
      <div class="app-boot__panel">
        <div class="app-boot__mark">EF</div>
        <p class="app-boot__title">系统加载中</p>
        <p class="app-boot__text">正在连接叉车业务协同服务...</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
