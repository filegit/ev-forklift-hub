# 维修服务配置文件
# 端口: 8084
# 功能: 维修订单管理

server:
  port: 8084

spring:
  application:
    name: efh-service
  
  shardingsphere:
    datasource:
      names: ds0
      ds0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/efh_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        username: root
        password: ${MYSQL_PASSWORD:123456}
    rules:
      sharding:
        tables:
          service_order:
            actual-data-nodes: ds0.service_order_$->{0..3}
            table-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: order-inline
        sharding-algorithms:
          order-inline:
            type: INLINE
            props:
              algorithm-expression: service_order_$->{id % 4}
    props:
      sql-show: true
  
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: 6379
    password: ${REDIS_PASSWORD:123456}
    database: 3
  
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: efh-service-group

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

redisson:
  address: redis://${REDIS_HOST:127.0.0.1}:6379
  password: ${REDIS_PASSWORD:123456}
  database: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.efh: debug
